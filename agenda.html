<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>

<style>
/* =======================
   🎨 PALETA PREMIUM
======================= */
:root{
  --bg-main:#020617;
  --bg-grad:#0f172a;
  --card:rgba(255,255,255,0.08);
  --card-hover:rgba(255,255,255,0.14);
  --border:rgba(255,255,255,0.14);
  --primary:#38bdf8;
  --accent:#22d3ee;
  --text-main:#ffffff;
  --text-muted:#94a3b8;
}

/* =======================
   🌌 BASE
======================= */
body{
  background:radial-gradient(circle at top,var(--bg-grad),var(--bg-main));
  color:var(--text-main);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  margin:0;
  padding:10px;
  min-height:100vh;
}

/* =======================
   🔍 BUSCADOR
======================= */
#busqueda{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06);
  color:#fff;
  font-size:14px;
  margin-bottom:10px;
  outline:none;
}
#busqueda::placeholder{color:var(--text-muted);}

/* =======================
   📆 FECHAS
======================= */
.date-nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}
.date-nav::-webkit-scrollbar{display:none;}

.date-btn{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:8px 10px;
  min-width:70px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
}
.date-btn span{
  font-size:.55rem;
  text-transform:uppercase;
  color:var(--text-muted);
}
.date-btn b{
  font-size:.75rem;
  font-weight:700;
}
.date-btn.active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#000;
}
.date-btn.active span{color:#000;}

/* =======================
   ⏳ LOADER
======================= */
#loading-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:60px 20px;
}
.spinner{
  width:36px;
  height:36px;
  border:4px solid rgba(255,255,255,.15);
  border-left-color:var(--primary);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* =======================
   🏟 EVENTOS
======================= */
.event-item{
  background:linear-gradient(180deg,var(--card),transparent);
  border:1px solid var(--border);
  border-radius:18px;
  margin-bottom:10px;
  overflow:hidden;
  backdrop-filter:blur(12px);
  transition:.3s;
}
.event-item:hover{
  background:var(--card-hover);
  transform:translateY(-2px);
}

.header-acordeon{
  display:grid;
  grid-template-columns:36px 1fr auto;
  gap:12px;
  align-items:center;
  padding:14px 16px;
  cursor:pointer;
}

.event-icon{
  width:34px;
  height:34px;
  background-size:contain;
  background-repeat:no-repeat;
  filter:drop-shadow(0 0 6px rgba(56,189,248,.5));
}

.event-liga{
  font-size:.6rem;
  font-weight:800;
  color:var(--accent);
  letter-spacing:.04em;
}

.event-title{
  font-size:.95rem;
  font-weight:700;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* =======================
   ⏰ HORA
======================= */
.t{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#000;
  font-size:.7rem;
  font-weight:900;
  padding:5px 10px;
  border-radius:999px;
  box-shadow:0 0 12px rgba(56,189,248,.45);
}

/* =======================
   📺 SUBMENÚ
======================= */
.submenu{
  display:none;
  background:rgba(2,6,23,.75);
  border-top:1px solid var(--border);
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(-6px);}
  to{opacity:1;transform:translateY(0);}
}

.subitem a{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  font-size:.75rem;
  text-decoration:none;
  color:#fff;
  transition:.25s;
}
.subitem a:hover{
  background:rgba(56,189,248,.15);
}

.lang-tag{
  background:var(--accent);
  color:#000;
  font-size:.6rem;
  font-weight:800;
  padding:2px 8px;
  border-radius:999px;
  margin-right:6px;
}

.ver-txt{
  color:var(--primary);
  font-weight:800;
  font-size:.65rem;
  border:1px solid var(--primary);
  padding:2px 8px;
  border-radius:999px;
}

@media (max-width:480px){
  .header-acordeon {
    /* En móviles, damos más espacio fijo para la hora */
    grid-template-columns: 36px minmax(0, 1fr) 60px;
  }

  /* Opcional: evita que el texto crezca y empuje la hora */
  .event-title {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
}

.t {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #000;
  font-size: .7rem;
  font-weight: 900;
  padding: 5px 10px;
  border-radius: 999px;
  white-space: nowrap; /* evita que la hora se parta */
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

body {
  overflow-x: hidden; /* evita scroll lateral en toda la página */
}

</style>
</head>

<body>
    
<center>  
<div id="fecha-titulo" style="margin-bottom:12px; font-weight:700; font-size:1.1rem; color:var(--primary); text-align:center;">
  Agenda Deportiva
</div>
   
</center>  

<input id="busqueda" placeholder="Buscar evento..." onkeyup="filtrarEventos()">
<div id="date-nav" class="date-nav"></div>

<div id="loading-screen">
  <div class="spinner"></div>
  <div style="color:var(--primary);font-size:.9rem;margin-top:10px;">Cargando agenda...</div>
</div>

<div id="eventos-container"></div>

<!-- 🔽 TU JS ORIGINAL (SIN TOCAR) -->

<script>
let agendaCompleta = {};
let fechaSeleccionada = "";

// Función para codificar URLs
const toBase64 = s => btoa(unescape(encodeURIComponent(s)));

// Función para obtener iconos de deportes
function obtenerLogoDeporte(cat, liga, tit){
  cat = (cat||"").toUpperCase();
  liga = (liga||"").toUpperCase();
  tit = (tit||"").toUpperCase();

  // Prioridad: detectar fútbol europeo/internacional
  const futbolEuropeo = ["ALLSVENSKAN","ELITSERIEN","FINLAND","INTERNATIONAL FRIENDLY", "UEFA","CHAMPIONS"];
  if(futbolEuropeo.some(x => liga.includes(x) || tit.includes(x))) 
      return "https://cdn-icons-png.flaticon.com/512/4977/4977738.png";

  // Hockey
  if(cat.includes("NHL") || cat.includes("HOCKEY")) return "https://upload.wikimedia.org/wikipedia/en/thumb/3/3a/05_NHL_Shield.svg/1280px-05_NHL_Shield.svg.png";

  // NFL
  if(cat.includes("NFL") || cat.includes("AMERICAN FOOTBALL")) return "https://cdn-icons-png.flaticon.com/512/5015/5015173.png";

  // Fórmula 1
  if(cat.includes("F1")) return "https://cdn-icons-png.flaticon.com/512/2418/2418779.png";
  
  // Logo exclusivo para NBA
  if(tit.includes("NBA") || liga.includes("NBA")) 
    return "/flags/nba.png";

  // Basket
  if(cat.includes("BASKET") || tit.includes("NBA")) return "https://images.emojiterra.com/google/android-12l/512px/1f3c0.png";

  // Fútbol genérico
  if(cat.includes("FOOT") || cat.includes("SOCCER")) return "https://cdn-icons-png.flaticon.com/512/4977/4977738.png";

  // Logo genérico
  return "https://cdn-icons-png.flaticon.com/512/1165/1165249.png";
}

// Cargar eventos desde el proxy
async function loadMatches(){
  try{
    const res = await fetch("https://onlive.sx/proxy_list.php?t=" + Date.now());
    const json = await res.json();
    const matches = json.matches || json.data?.matches || [];

    agendaCompleta = {};

    matches.forEach(m => {
      if(!m || !m.startTimestamp || !m.matchstr) return;

      const d = new Date(m.startTimestamp);
      const f = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if(!agendaCompleta[f]) agendaCompleta[f] = [];
      agendaCompleta[f].push(m);
    });

    // Seleccionar hoy si hay eventos, si no el primer día disponible
    const hoy = new Date().toISOString().split('T')[0];
    fechaSeleccionada = agendaCompleta[hoy] ? hoy : Object.keys(agendaCompleta).sort()[0];

    document.getElementById("loading-screen").style.display = "none";

    renderDateNav();
    renderEventos();
  }catch(e){
    console.error(e);
    document.getElementById("loading-screen").innerText = "Error cargando eventos";
  }
}

// Renderiza los botones de fecha (pestañas)
function renderDateNav(){
  const nav = document.getElementById("date-nav");
  const fechas = Object.keys(agendaCompleta).sort(); // Orden cronológico
  nav.innerHTML = fechas.map(f => {
    const d = new Date(f + "T12:00:00");
    return `<div class="date-btn ${f===fechaSeleccionada?'active':''}" onclick="cambiarFecha('${f}')">
      <span>${d.toLocaleDateString('es',{weekday:'short'})}</span>
      <b>${d.getDate()} ${d.toLocaleDateString('es',{month:'short'})}</b>
    </div>`;
  }).join('');
}

// Cambiar día activo
function cambiarFecha(f){
  fechaSeleccionada = f;
  renderDateNav();
  renderEventos();
}

// Renderiza eventos del día seleccionado
function renderEventos(){
  const c = document.getElementById("eventos-container");
  // Tomamos solo los eventos del día seleccionado y los ordenamos por hora
  const ligasOcultas = [
  "AUSTRALIA A-LEAGUE",
  "AFL",
  "NRL",
  "PORTUGAL SEGUNDA LIGA",
  "DIAMOND LEAGUE",
  "IIHF WORLD CHAMPIONSHIP",
  "SCOTLAND SCOTTISH PREMIERSHIP",
  "UNITED RUGBY CHAMPIONSHIP",
  "FRANCE TOP 14",
  "POLAND EKSTRAKLASA",
  "BULGARIA PARVA LIGA",
  "EHF EUROPEAN LEAGUE WOMEN",
  "SWEDEN ALLSVENSKAN",
  "NORWAY ELITESERIEN",
  "CROATIA 1. HNL",
  "CZECH REPUBLIC 1. LIGA",
  "AUSTRIA BUNDESLIGA",
  "SWITZERLAND SUPER LEAGUE",
  "GREECE SUPER LEAGUE",
  "GERMANY 3. LIGA"
    ];

const eventosDelDia = (agendaCompleta[fechaSeleccionada] || [])
  .filter(m => !ligasOcultas.includes((m.league || "").toUpperCase()))
  .sort((a,b) => a.startTimestamp - b.startTimestamp);


  c.innerHTML = eventosDelDia.map(m => {
    const channels = Array.isArray(m.channels) ? m.channels : [];
    if(channels.length === 0) return "";

    const opciones = channels.map(ch => {
      const lang = (ch.language || "ES").toUpperCase();
      const embed = `https://strongst.link/ch?id=${ch.number}`;
      const url = `/eventos/?r=${toBase64(embed)}`;
      return `<li class="subitem"><a href="${url}" target="_blank">
        <span><span class="lang-tag">${lang}</span>${ch.name||"Canal"}</span>
        <span class="ver-txt">VER</span></a></li>`;
    }).join("");

    const h = new Date(m.startTimestamp).toLocaleTimeString('es',{
      hour:'2-digit', minute:'2-digit'
    });

    return `<div class="event-item">
      <div class="header-acordeon" onclick="toggleSub(this)">
        <div class="event-icon" style="background-image:url('${obtenerLogoDeporte(m.sport, m.league, m.matchstr)}')"></div>
        <div class="info-wrapper">
          <span class="event-liga">${m.league||""}</span>
          <span class="event-title">${m.matchstr}</span>
        </div>
        <span class="t">${h}</span>
      </div>
      <ul class="submenu">${opciones}</ul>
    </div>`;
  }).join("");
}

// Mostrar/ocultar submenú de canales
function toggleSub(el){
  const submenu = el.nextElementSibling;
  const abierto = submenu.style.display === "block";

  document.querySelectorAll(".submenu").forEach(s=>{
    s.style.display = "none";
  });

  if(!abierto) submenu.style.display = "block";
}

// Filtrar eventos por texto
function filtrarEventos(){
  const q = document.getElementById("busqueda").value.toLowerCase();
  document.querySelectorAll(".event-item").forEach(e=>{
    e.style.display = e.innerText.toLowerCase().includes(q) ? "block" : "none";
  });
}

// Iniciar carga
loadMatches();
</script>

</body>
</html>
