    <script>
        (function loadStream() {
            const params = new URLSearchParams(window.location.search);
            const stream = params.get('r') || params.get('embed');
            const target = document.getElementById('player-target');
            if (stream) {
                try {
                    const decoded = atob(stream.trim());
                    const iframe = document.createElement('iframe');
                    iframe.src = decoded;
                    iframe.allowFullscreen = true;
                    iframe.setAttribute('scrolling', 'no');
                    iframe.setAttribute('allow', 'autoplay; encrypted-media');
                    target.appendChild(iframe);
                } catch (e) {
                    target.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px; font-weight:bold;">ERROR DE SEÑAL</div>';
                }
            } else {
                target.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px; font-weight:bold;">ESPERANDO SEÑAL...</div>';
            }
        })();
